# Hardcoded Secret Detection Signatures
# Used by the secrets scanner for pattern matching

patterns:
  - name: AWS Access Key
    type: aws_access_key
    pattern: 'AKIA[0-9A-Z]{16}'
    severity: critical
    confidence: 0.95

  - name: AWS Secret Key
    type: aws_secret_key
    pattern: '(?i)aws(.{0,20})?(?-i)[''"][0-9a-zA-Z/+]{40}[''"]'
    severity: critical
    confidence: 0.8

  - name: Google API Key
    type: google_api_key
    pattern: 'AIza[0-9A-Za-z\-_]{35}'
    severity: high
    confidence: 0.95

  - name: Firebase URL
    type: firebase_url
    pattern: 'https://[a-z0-9\-]+\.firebaseio\.com'
    severity: high
    confidence: 0.9

  - name: Private Key
    type: private_key
    pattern: '-----BEGIN (?:RSA |EC )?PRIVATE KEY-----'
    severity: critical
    confidence: 0.95

  - name: GitHub Token
    type: github_token
    pattern: 'gh[ps]_[0-9a-zA-Z]{36,}'
    severity: critical
    confidence: 0.95

  - name: Slack Token
    type: slack_token
    pattern: 'xox[baprs]-[0-9]{10,13}-[0-9a-zA-Z]{24,}'
    severity: high
    confidence: 0.95

  - name: Stripe Key
    type: stripe_key
    pattern: '(?:sk|pk)_(?:test|live)_[0-9a-zA-Z]{24,}'
    severity: critical
    confidence: 0.95

  - name: SendGrid API Key
    type: sendgrid_api_key
    pattern: 'SG\.[0-9a-zA-Z\-_]{22}\.[0-9a-zA-Z\-_]{43}'
    severity: high
    confidence: 0.95
